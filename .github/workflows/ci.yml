# CI : lint (ruff), format (ruff format --check) et tests (pytest) sur chaque PR
# et sur les pushes vers main. Aligné sur PLO-8 (ruff uniquement, pas black).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint & tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-qt.txt

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      # Pandoc est le moteur de secours du projet : on l'installe en CI pour
      # exécuter les tests d'intégration réels (tests/integration/test_pandoc_real.py).
      # Sans cette étape, ces tests seraient automatiquement skip via skipif.
      - name: Installer Pandoc
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pandoc

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (formatage, vérification)
        run: ruff format --check .

      - name: Pytest
        run: pytest

      # Bibliothèques système requises par PySide6/Qt6 sur Ubuntu, même en mode
      # offscreen (Qt charge libEGL pour ses plugins de plateforme).
      # `apt-get update` a déjà été fait à l'étape « Installer Pandoc ».
      - name: Installer les libs système Qt (Ubuntu)
        if: matrix.python-version == '3.12'
        run: sudo apt-get install -y --no-install-recommends libegl1 libxkbcommon0 libfontconfig1 libdbus-1-3

      # Installation pip des dépendances Qt isolée : peut échouer pour des raisons
      # indépendantes du code (wheels manquants, miroir indisponible, etc.).
      # Si l'install échoue, le smoke suivant est sauté (cf. `if:`) et la CI
      # reste verte ; en revanche une régression du code Qt avec install OK
      # fera bien échouer la matrice.
      - name: Installer PySide6 (optionnel, smoke UI Qt)
        id: install_qt
        if: matrix.python-version == '3.12'
        continue-on-error: true
        run: pip install -r requirements-qt.txt

      - name: Smoke UI Qt (offscreen)
        if: matrix.python-version == '3.12' && steps.install_qt.outcome == 'success'
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python - <<'PY'
          import sys
          from PySide6.QtWidgets import QApplication
          from ui_qt import MarkdownConverterQtApp

          app = QApplication(sys.argv)
          a = MarkdownConverterQtApp()
          a.build()
          assert a.zones is not None and a.zones.journal.isVisible() is False
          assert a.file_view_parts is not None
          assert a.file_view_parts.model.columnCount() == 5
          assert a.output_banner_parts is not None
          assert a.output_banner_parts.error_label.objectName() == "output_banner_error"
          assert a.toolbar_parts is not None
          assert a.toolbar_parts.search_input.objectName() == "toolbar_search"
          assert a.file_view_parts.clear_button.objectName() == "file_view_clear"
          assert a.footer_parts is not None
          assert a.footer_parts.convert_button.isEnabled() is False
          print("UI Qt offscreen OK :", a.zones.titlebar.objectName())
          PY
