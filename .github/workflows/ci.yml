# CI : lint (ruff), format (ruff format --check), tests (pytest) et build front
# (npm ci && vite build) sur chaque PR et push vers main.
# Python : PLO-8 (ruff uniquement, pas black). Front : PLO-47.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint & tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-qt.txt

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      # Pandoc est le moteur de secours du projet : on l'installe en CI pour
      # exécuter les tests d'intégration réels (tests/integration/test_pandoc_real.py).
      # Sans cette étape, ces tests seraient automatiquement skip via skipif.
      - name: Installer Pandoc
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pandoc

      # PLO-31 : PySide6 + libs système **avant** pytest sur 3.12 pour exécuter les
      # tests Qt (offscreen) dans la même matrice que ruff/pytest.
      # Bibliothèques requises même en mode offscreen (plugins plateforme / EGL).
      - name: Installer PySide6 et libs Qt (Python 3.12)
        if: matrix.python-version == '3.12'
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          sudo apt-get install -y --no-install-recommends libegl1 libxkbcommon0 libfontconfig1 libdbus-1-3
          pip install -r requirements-qt.txt

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (formatage, vérification)
        run: ruff format --check .

      - name: Pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest

  web:
    name: build front (Node.js 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build front Vite
        run: ./scripts/build_web.sh

      - name: Vérifier web/dist
        run: test -f web/dist/index.html
